name: Rotate Daily Quote

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Fetch a random quote
      - name: Fetch random quote
        id: quote
        run: |
          # Download quotes
          curl -s https://type.fit/api/quotes -o quotes.json

          # Select a random quote
          LENGTH=$(jq length quotes.json)
          INDEX=$(( RANDOM % LENGTH ))
          TEXT=$(jq -r ".[$INDEX].text" quotes.json)
          AUTHOR=$(jq -r ".[$INDEX].author // \"Unknown\"" quotes.json)
          QUOTE="$TEXT — $AUTHOR"
          echo "QUOTE=$QUOTE" >> $GITHUB_ENV

          # Save date for PR title
          TODAY=$(date +'%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV

          # Create a unique branch name
          BRANCH_NAME="daily-quote-$(date +'%Y%m%d%H%M%S')"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # 3️⃣ Replace quote in README.md
      - name: Replace quote in README
        run: |
          sed -i "s|<!--QUOTE-->.*<!--QUOTE_END-->|<!--QUOTE-->$QUOTE<!--QUOTE_END-->|" README.md

      # 4️⃣ Create Pull Request
      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}        # Use your PAT
          commit-message: "Update daily quote"
          branch: ${{ env.BRANCH_NAME }}        # unique branch
          base: main
          title: "🤖 Automated Daily Quote Update – ${{ env.TODAY }}"
          body: |
            This PR was automatically generated by GitHub Actions.
            It updates the daily quote in README.md.

            > ${{ env.QUOTE }}
          delete-branch: true                    # delete after merge

      # 5️⃣ Merge PR automatically
      - name: Merge PR automatically
        if: success()
        run: |
          PR_NUMBER="${{ steps.create-pr.outputs.pull-request-number }}"
          echo "Merging PR #$PR_NUMBER"

          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/merge \
            -d '{"merge_method":"rebase"}'