name: Rotate Daily Quote

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *" # daily at 12:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout (IMPORTANT FIX: use PAT)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      # 2️⃣ Install jq (safe for all runners)
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Fetch random quote
      - name: Fetch random quote
        id: quote
        run: |
          curl -s https://type.fit/api/quotes -o quotes.json

          LENGTH=$(jq length quotes.json)
          INDEX=$(( RANDOM % LENGTH ))

          TEXT=$(jq -r ".[$INDEX].text" quotes.json)
          AUTHOR=$(jq -r ".[$INDEX].author // \"Unknown\"" quotes.json)

          QUOTE="$TEXT — $AUTHOR"

          echo "QUOTE<<EOF" >> $GITHUB_ENV
          echo "$QUOTE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          TODAY=$(date +'%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV

          BRANCH_NAME="daily-quote-$(date +'%Y%m%d%H%M%S')"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      # 4️⃣ Update README
      - name: Replace quote in README
        run: |
          sed -i "s|<!--QUOTE-->.*<!--QUOTE_END-->|<!--QUOTE-->${QUOTE}<!--QUOTE_END-->|" README.md

      # 5️⃣ Create Pull Request
      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Update daily quote"
          branch: ${{ env.BRANCH_NAME }}
          base: main
          title: "🤖 Automated Daily Quote Update – ${{ env.TODAY }}"
          body: |
            This PR was automatically generated by GitHub Actions.

            It updates the daily quote in README.md:

            > ${{ env.QUOTE }}

          delete-branch: true

      # 6️⃣ Auto-merge PR (SAFE GitHub API way)
      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: |
          PR_NUMBER=${{ steps.create-pr.outputs.pull-request-number }}

          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER/merge \
            -d '{"merge_method":"squash"}'
